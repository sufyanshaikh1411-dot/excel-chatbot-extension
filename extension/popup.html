<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Excel Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 380px;
      padding: 10px;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #sheetSelect {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    #chat {
      height: 340px;
      border: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    #q {
      flex: 1;
      padding: 8px;
    }

    #sendBtn {
      padding: 8px 12px;
      cursor: pointer;
    }

    .user-msg {
      margin-bottom: 8px;
    }

    .bot-msg {
      margin-bottom: 16px;
    }

    a {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h3>Excel Chatbot</h3>

  <select id="sheetSelect">
    <option value="BIV">BIV</option>
    <option value="N">N</option>
    <option value="Refresher session document">Refresher session document</option>
    <option value="IS Links">IS Links</option>
  </select>

  <div id="chat"></div>

  <div class="row">
    <input id="q" type="text" placeholder="Ask question...">
    <button id="sendBtn">Send</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
