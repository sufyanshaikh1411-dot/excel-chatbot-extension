<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Excel Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 10px;
    }

    #chat {
      height: 250px;
      border: 1px solid #ccc;
      overflow-y: auto;
      padding: 8px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    #q {
      width: 220px;
      padding: 6px;
    }

    #sendBtn {
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <h3>Excel Chatbot</h3>

  <div id="chat"></div>

  <input id="q" type="text" placeholder="Ask question...">
  <button id="sendBtn">Send</button>

  <script src="popup.js"></script>
</body>
</html>
